<mat-card>
    <h1 class="text-primary">{{isineditMode ? 'Update Student' : 'Add Student'}}</h1>
    <form #stdform="ngForm" (ngSubmit)="onSubmit()">
        <div class="form-group">
            <label for="fname" class="text-primary">First Name*</label>
            <input type="text" ngModel name="fname" #fname="ngModel" class="form-control">
        </div>
        <div class="form-group">
            <label for="lname" class="text-primary">Last Name*</label>
            <input type="text" ngModel name="lname" #lname="ngModel" class="form-control">
        </div>
        <div class="form-group">
            <label for="email" class="text-primary">Email*</label>
            <input type="text" ngModel name="email" #email="ngModel" class="form-control">
        </div>
        <div class="form-group">
            <label for="contact" class="text-primary">Contact*</label>
            <input type="text" ngModel name="contact" #contact="ngModel" class="form-control">
        </div>

        <button
        *ngIf="!isineditMode"
         mat-raised-button color="primary" class="w-100">Add Student</button>
        <button 
        *ngIf="isineditMode"
        type="button"
        (click)="onUpadate()"
        mat-raised-button color="primary" class="w-100">Update Student</button>
    </form>
</mat-card>
